<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sonar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #060d1a; --surface: #0e1628; --border: #1a2744;
    --text: #eef; --muted: #556; --cyan: #00d4ff; --amber: #ffaa00;
    --red: #ff4444; --green: #00ff88;
  }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--surface); flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .project-name { font-weight: 600; font-size: 16px; }
  .branch { color: var(--muted); font-size: 12px; }
  .header-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 11px; padding: 4px 8px; cursor: pointer; font-weight: 600;
  }
  .ctx-bar { height: 3px; background: var(--surface); flex-shrink: 0; }
  .ctx-fill { height: 3px; transition: width 0.3s, background 0.3s; }
  .conversation {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .entry { display: flex; flex-direction: column; gap: 6px; }
  .user-bubble {
    align-self: flex-end; background: var(--border); border-radius: 12px 12px 4px 12px;
    padding: 8px 12px; max-width: 85%; font-size: 14px; color: #aac;
  }
  .response-bubble {
    align-self: flex-start; background: var(--surface); border-radius: 12px 12px 12px 4px;
    padding: 10px 12px; max-width: 90%; font-size: 14px; line-height: 1.5;
    border-left: 2px solid var(--cyan); white-space: pre-wrap;
  }
  .thinking {
    align-self: flex-start; background: var(--surface); border-radius: 12px;
    padding: 10px 14px; border-left: 2px solid var(--amber);
    color: var(--amber); font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .timing { color: #334; font-size: 10px; text-align: right; margin-top: 6px; }
  .options {
    background: #0a1020; border: 1px solid #1a3055; border-radius: 12px;
    padding: 14px; margin: 0 16px 8px;
  }
  .options-header { color: var(--cyan); font-size: 12px; margin-bottom: 10px; }
  .option-row {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
    cursor: pointer; padding: 4px; border-radius: 6px;
  }
  .option-row:hover { background: rgba(0,212,255,0.05); }
  .option-num {
    width: 24px; height: 24px; border-radius: 12px; border: 1px solid var(--cyan);
    background: rgba(0,212,255,0.1); display: flex; align-items: center; justify-content: center;
    color: var(--cyan); font-weight: bold; font-size: 13px; flex-shrink: 0;
  }
  .option-text { color: #dde; font-size: 14px; padding-top: 2px; }
  .option-all {
    text-align: center; color: var(--cyan); font-size: 13px; font-weight: 600;
    cursor: pointer; padding: 8px; border-top: 1px solid #1a3055; margin-top: 4px;
  }
  .activity {
    padding: 8px 16px; background: var(--surface); font-size: 11px;
    color: var(--amber); display: none; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .activity.visible { display: flex; }
  .activity-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .controls {
    padding: 16px; border-top: 2px solid var(--surface); flex-shrink: 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .record-row { display: flex; align-items: center; gap: 12px; }
  .record-btn {
    width: 56px; height: 56px; border-radius: 28px; border: 2px solid var(--cyan);
    background: var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 24px; flex-shrink: 0; transition: all 0.2s;
    -webkit-user-select: none; user-select: none;
  }
  .record-btn.recording { border-color: var(--red); background: #3d0f0f; }
  .record-btn.disabled { opacity: 0.4; pointer-events: none; }
  .text-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); padding: 12px 16px; font-size: 15px; outline: none; resize: none;
    font-family: inherit; min-height: 44px; max-height: 120px;
  }
  .text-input::placeholder { color: #445; }
  .send-btn {
    background: var(--cyan); color: #000; border: none; border-radius: 10px;
    padding: 12px 20px; font-weight: 600; cursor: pointer; font-size: 14px; flex-shrink: 0;
  }
  .send-btn:disabled { opacity: 0.4; }
  .status-line { font-size: 11px; color: var(--muted); text-align: center; }
  .session-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 24px;
  }
  .session-title { color: var(--cyan); font-size: 36px; font-weight: bold; letter-spacing: 4px; }
  .session-subtitle { color: var(--muted); margin-top: 8px; margin-bottom: 32px; }
  .session-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; width: 100%; max-width: 400px; margin-bottom: 16px;
  }
  .session-card-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .session-item {
    padding: 10px 12px; background: #0a1528; border-radius: 8px; margin-bottom: 8px; cursor: pointer;
  }
  .session-item:hover { background: #0e1d38; }
  .session-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .session-item-name { color: #aac; font-size: 15px; font-weight: 600; }
  .session-item-time { color: #445; font-size: 11px; }
  .session-item-preview { color: var(--muted); font-size: 13px; }
  .new-session-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 12px; font-size: 15px; outline: none; margin-bottom: 12px;
  }
  .new-session-btn {
    width: 100%; background: var(--cyan); color: #000; border: none; border-radius: 8px;
    padding: 14px; font-weight: bold; font-size: 15px; cursor: pointer;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px;
    width: 100%; max-width: 500px;
  }
  .modal h3 { color: var(--text); margin-bottom: 16px; }
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .setting-label { color: #aac; font-size: 14px; }
  .setting-value { color: var(--cyan); font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<div id="session-screen" class="session-screen">
  <div class="session-title">SONAR</div>
  <div class="session-subtitle">Navigate code by voice</div>
  <div class="session-card" id="prev-sessions" style="display:none">
    <div class="session-card-label">Resume session</div>
    <div id="session-list"></div>
  </div>
  <div class="session-card">
    <div class="session-card-label">New session</div>
    <input class="new-session-input" id="project-input" placeholder="project folder path (e.g. MVP/sonar)" autocapitalize="off">
    <button class="new-session-btn" id="start-btn">Start</button>
  </div>
</div>

<div id="voice-screen" style="display:none; flex-direction:column; height:100dvh;">
  <div class="header">
    <div class="header-left">
      <span style="color:var(--cyan);cursor:pointer" id="back-btn">&larr;</span>
      <span class="project-name" id="project-name-display"></span>
      <span class="branch" id="branch-display"></span>
    </div>
    <div><button class="header-btn" id="settings-btn">&#9881;</button></div>
  </div>
  <div class="ctx-bar"><div class="ctx-fill" id="ctx-fill"></div></div>
  <div class="activity" id="activity-bar">
    <div class="activity-dot"></div>
    <span id="activity-text">Starting...</span>
    <span id="activity-elapsed" style="margin-left:auto;color:#445"></span>
  </div>
  <div class="conversation" id="conversation"></div>
  <div id="options-container"></div>
  <div class="controls">
    <div class="status-line" id="status-line">Ready</div>
    <div class="record-row">
      <div class="record-btn" id="record-btn">&#127897;</div>
      <textarea class="text-input" id="text-input" placeholder="Or type here..." rows="1"></textarea>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Settings</h3>
    <div class="setting-row"><span class="setting-label">Model</span><span class="setting-value" id="setting-model">sonnet</span></div>
    <div class="setting-row"><span class="setting-label">Effort</span><span class="setting-value" id="setting-effort">low</span></div>
    <div class="setting-row"><span class="setting-label">TTS</span><span class="setting-value" id="setting-tts">ON</span></div>
    <div class="setting-row"><span class="setting-label">Plan mode</span><span class="setting-value" id="setting-plan">OFF</span></div>
    <div class="setting-row"><span class="setting-label">Context</span><span class="setting-value" id="setting-ctx">0k</span></div>
    <div style="margin-top:16px;text-align:center"><button class="header-btn" id="close-settings">Close</button></div>
  </div>
</div>

<script>
const API = window.location.origin;
let sessionId = null, projectName = '', sessionState = 'idle', uiState = 'idle';
let ttsEnabled = true, contextTokens = 0, mediaRecorder = null, audioChunks = [];
let processingStart = 0, elapsedTimer = null, activityTimer = null;
let settings = { model: 'sonnet', effort: 'low', plan_mode: false };

const $ = (id) => document.getElementById(id);
const $conv = $('conversation');

function timeAgo(ts) {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// Safe DOM helpers
function createTextEl(tag, text, className) {
  const el = document.createElement(tag);
  el.textContent = text;
  if (className) el.className = className;
  return el;
}

function addMessage(role, text, timing) {
  const entry = document.createElement('div');
  entry.className = 'entry';
  const bubble = document.createElement('div');
  bubble.className = role === 'user' ? 'user-bubble' : 'response-bubble';
  bubble.textContent = text;
  entry.appendChild(bubble);
  if (timing && role === 'assistant') {
    const t = document.createElement('div');
    t.className = 'timing';
    t.textContent = 'Claude ' + timing.claude + 's' + (timing.tts > 0 ? ' · TTS ' + timing.tts + 's' : '');
    entry.appendChild(t);
  }
  $conv.appendChild(entry);
  $conv.scrollTop = $conv.scrollHeight;
}

function addThinking() {
  const el = document.createElement('div');
  el.className = 'entry'; el.id = 'thinking-bubble';
  const inner = document.createElement('div');
  inner.className = 'thinking';
  const dot = document.createElement('div'); dot.className = 'activity-dot';
  inner.appendChild(dot);
  inner.appendChild(document.createTextNode(' Thinking...'));
  el.appendChild(inner);
  $conv.appendChild(el);
  $conv.scrollTop = $conv.scrollHeight;
}

function removeThinking() { const el = $('thinking-bubble'); if (el) el.remove(); }

function showOptions(options) {
  const container = $('options-container');
  container.textContent = '';
  const wrap = document.createElement('div'); wrap.className = 'options';
  const header = document.createElement('div'); header.className = 'options-header';
  header.textContent = 'Tap to select or type a number';
  wrap.appendChild(header);
  options.forEach((opt, i) => {
    const row = document.createElement('div'); row.className = 'option-row';
    row.addEventListener('click', () => selectOption(String(i + 1)));
    const num = document.createElement('div'); num.className = 'option-num'; num.textContent = String(i + 1);
    const txt = document.createElement('div'); txt.className = 'option-text'; txt.textContent = opt;
    row.appendChild(num); row.appendChild(txt); wrap.appendChild(row);
  });
  if (options.length > 1) {
    const all = document.createElement('div'); all.className = 'option-all';
    all.textContent = 'Select all';
    all.addEventListener('click', () => selectOption('all'));
    wrap.appendChild(all);
  }
  container.appendChild(wrap);
}

function clearOptions() { $('options-container').textContent = ''; }

async function selectOption(n) {
  clearOptions();
  const text = n === 'all' ? 'User selected all options. Proceed with all of them.' : 'User selected option ' + n + '.';
  addMessage('user', n === 'all' ? 'All options' : 'Option ' + n);
  await sendToBackend(text, 'awaiting_response');
}

// Session management
async function loadSessions() {
  try {
    const res = await fetch(API + '/sessions');
    const sessions = await res.json();
    if (sessions.length > 0) {
      $('prev-sessions').style.display = 'block';
      const list = $('session-list');
      list.textContent = '';
      sessions.forEach(s => {
        const item = document.createElement('div'); item.className = 'session-item';
        item.addEventListener('click', () => doResumeSession(s.session_id));
        const hdr = document.createElement('div'); hdr.className = 'session-item-header';
        const name = document.createElement('span'); name.className = 'session-item-name';
        name.textContent = s.project_name + (s.branch ? ' · ' + s.branch : '');
        const time = document.createElement('span'); time.className = 'session-item-time';
        time.textContent = timeAgo(s.updated_at);
        hdr.appendChild(name); hdr.appendChild(time); item.appendChild(hdr);
        const preview = document.createElement('div'); preview.className = 'session-item-preview';
        preview.textContent = s.last_message || s.message_count + ' messages';
        item.appendChild(preview); list.appendChild(item);
      });
    }
  } catch(e) {}
}

async function startNewSession(path) {
  const res = await fetch(API + '/session/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ project_path: path }),
  });
  if (!res.ok) { alert('Project not found'); return; }
  const data = await res.json();
  sessionId = data.session_id; projectName = data.project_name;
  showVoiceScreen();
}

async function doResumeSession(sid) {
  const res = await fetch(API + '/session/' + sid + '/resume');
  if (!res.ok) { alert('Session not found'); return; }
  const data = await res.json();
  sessionId = data.session_id; projectName = data.project_name;
  showVoiceScreen();
  for (let i = 0; i < data.conversation.length; i += 2) {
    const user = data.conversation[i];
    const assistant = data.conversation[i + 1];
    if (user) addMessage('user', user.content);
    if (assistant) addMessage('assistant', assistant.content);
  }
}

function showVoiceScreen() {
  $('session-screen').style.display = 'none';
  $('voice-screen').style.display = 'flex';
  $('project-name-display').textContent = projectName;
  loadSettings();
}

// Core send
async function sendToBackend(text, state) {
  addThinking(); setUI('processing'); startActivityPolling();
  try {
    const endpoint = state === 'awaiting_response' ? '/respond/text' : '/prompt/text';
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 120000);
    const res = await fetch(API + endpoint, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sessionId, text: text, tts: ttsEnabled }),
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    removeThinking();
    addMessage('assistant', data.response_text, data.timing);
    sessionState = data.state;
    if (data.context_tokens) updateContext(data.context_tokens);
    if (data.options && data.options.length > 0) showOptions(data.options);
    else clearOptions();
    if (ttsEnabled && data.audio_url) {
      setUI('listening');
      await playBase64Audio(data.audio_url);
    }
  } catch(e) {
    removeThinking();
    addMessage('assistant', 'Error: ' + (e.message || 'Network error'));
  }
  stopActivityPolling(); setUI('idle');
}

// Recording
async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  audioChunks = [];
  mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
  mediaRecorder.start(); setUI('recording');
}

function stopRecording() {
  return new Promise(resolve => {
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null; resolve(blob);
    };
    mediaRecorder.stop();
  });
}

const $rec = $('record-btn');
$rec.addEventListener('mousedown', () => { if (uiState === 'idle') startRecording(); });
$rec.addEventListener('touchstart', (e) => { e.preventDefault(); if (uiState === 'idle') startRecording(); });
$rec.addEventListener('mouseup', handleRecordEnd);
$rec.addEventListener('touchend', handleRecordEnd);

async function handleRecordEnd() {
  if (uiState !== 'recording') return;
  const blob = await stopRecording();
  setUI('transcribing');
  const form = new FormData(); form.append('audio', blob, 'audio.webm');
  try {
    const res = await fetch(API + '/transcribe', { method: 'POST', body: form });
    const data = await res.json();
    addMessage('user', data.transcript);
    await sendToBackend(data.transcript, sessionState);
  } catch(e) {
    addMessage('user', 'Transcription failed');
    setUI('idle');
  }
}

// Text input
$('send-btn').addEventListener('click', sendTextInput);
$('text-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextInput(); }
});
$('text-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

async function sendTextInput() {
  const input = $('text-input');
  const text = input.value.trim();
  if (!text || uiState !== 'idle') return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  await sendToBackend(text, sessionState);
}

// TTS
function playBase64Audio(b64) {
  return new Promise(resolve => {
    const audio = new Audio('data:audio/mp3;base64,' + b64);
    audio.onended = resolve; audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

// UI state
function setUI(state) {
  uiState = state;
  $rec.className = 'record-btn' + (state === 'recording' ? ' recording' : '') + (state !== 'idle' && state !== 'recording' ? ' disabled' : '');
  const labels = { idle: 'Ready', recording: 'Recording...', transcribing: 'Transcribing...', processing: 'Claude is working...', listening: 'Playing...' };
  $('status-line').textContent = labels[state] || '';
  if (state === 'processing') {
    processingStart = Date.now();
    elapsedTimer = setInterval(() => {
      const s = Math.floor((Date.now() - processingStart) / 1000);
      $('status-line').textContent = 'Claude is working... ' + s + 's';
    }, 1000);
  } else { clearInterval(elapsedTimer); }
}

// Activity
function startActivityPolling() {
  $('activity-bar').classList.add('visible');
  activityTimer = setInterval(async () => {
    try {
      const res = await fetch(API + '/session/' + sessionId + '/activity');
      const data = await res.json();
      if (data.activity && data.activity.length > 0) $('activity-text').textContent = data.activity[data.activity.length - 1];
    } catch {}
  }, 1500);
}
function stopActivityPolling() { clearInterval(activityTimer); $('activity-bar').classList.remove('visible'); }

// Context
function updateContext(tokens) {
  contextTokens = tokens;
  const pct = Math.min(tokens / 200000, 1);
  const color = pct < 0.5 ? 'var(--green)' : pct < 0.75 ? '#ffdd44' : pct < 0.9 ? 'var(--amber)' : 'var(--red)';
  $('ctx-fill').style.width = (pct * 100) + '%'; $('ctx-fill').style.background = color;
}

// Settings
async function loadSettings() {
  try { const res = await fetch(API + '/settings'); settings = await res.json(); updateSettingsUI(); } catch {}
}
function updateSettingsUI() {
  $('setting-model').textContent = settings.model;
  $('setting-effort').textContent = settings.effort;
  $('setting-tts').textContent = ttsEnabled ? 'ON' : 'OFF';
  $('setting-plan').textContent = settings.plan_mode ? 'ON' : 'OFF';
  $('setting-ctx').textContent = contextTokens > 0 ? Math.round(contextTokens/1000) + 'k' : '0k';
}
$('settings-btn').addEventListener('click', () => { updateSettingsUI(); $('settings-modal').classList.add('visible'); });
$('settings-modal').addEventListener('click', (e) => { if (e.target.id === 'settings-modal') e.target.classList.remove('visible'); });
$('close-settings').addEventListener('click', () => $('settings-modal').classList.remove('visible'));

$('setting-model').addEventListener('click', async () => {
  const m = ['haiku','sonnet','opus']; const next = m[(m.indexOf(settings.model)+1)%m.length];
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:next})});
  settings.model = next; updateSettingsUI();
});
$('setting-effort').addEventListener('click', async () => {
  const e = ['low','medium','high','max']; const next = e[(e.indexOf(settings.effort)+1)%e.length];
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({effort:next})});
  settings.effort = next; updateSettingsUI();
});
$('setting-tts').addEventListener('click', () => { ttsEnabled = !ttsEnabled; updateSettingsUI(); });
$('setting-plan').addEventListener('click', async () => {
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan_mode:!settings.plan_mode})});
  settings.plan_mode = !settings.plan_mode; updateSettingsUI();
});

// Init
$('start-btn').addEventListener('click', () => { const p = $('project-input').value.trim(); if (p) startNewSession(p); });
$('project-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); $('start-btn').click(); } });
$('back-btn').addEventListener('click', () => {
  $('voice-screen').style.display = 'none'; $('session-screen').style.display = 'flex';
  sessionId = null; $conv.textContent = ''; clearOptions(); loadSessions();
});
loadSessions();
</script>
</body>
</html>
