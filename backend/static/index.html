<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sonar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #111; --surface: #191919; --border: #2a2a2a; --text: #d4d4d4; --muted: #666; --accent: #a78bfa; --amber: #f59e0b; --red: #ef4444; --green: #34d399; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; }
  code, .mono { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; }

  /* Session screen */
  .session-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 32px; }
  .session-title { font-size: 14px; font-weight: 500; letter-spacing: 6px; text-transform: uppercase; color: var(--muted); }
  .session-subtitle { color: var(--muted); margin-top: 4px; margin-bottom: 40px; font-size: 13px; }
  .session-card { width: 100%; max-width: 420px; margin-bottom: 24px; }
  .session-card-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .session-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .session-item:hover { background: var(--surface); margin: 0 -8px; padding: 10px 8px; border-radius: 4px; }
  .session-item-header { display: flex; justify-content: space-between; align-items: center; }
  .session-item-name { color: var(--text); font-size: 14px; font-weight: 500; }
  .session-item-time { color: var(--muted); font-size: 11px; }
  .session-item-preview { color: var(--muted); font-size: 12px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .new-session-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); padding: 10px 0; font-size: 14px; outline: none; font-family: inherit; }
  .new-session-input::placeholder { color: #444; }
  .new-session-input:focus { border-color: var(--accent); }
  .new-session-btn { width: 100%; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 10px; font-weight: 500; font-size: 13px; cursor: pointer; margin-top: 12px; letter-spacing: 0.5px; }
  .new-session-btn:hover { background: rgba(167,139,250,0.1); }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; height: 44px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .project-name { font-weight: 500; font-size: 13px; color: var(--text); }
  .branch { color: var(--muted); font-size: 11px; font-family: 'SF Mono', monospace; }
  .header-btn { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 4px; }
  .header-btn:hover { color: var(--text); }

  /* Context bar */
  .ctx-bar { height: 2px; background: var(--surface); flex-shrink: 0; }
  .ctx-fill { height: 2px; transition: width 0.3s; }

  /* Activity */
  .activity { padding: 6px 20px; font-size: 11px; color: var(--amber); display: none; align-items: center; gap: 6px; flex-shrink: 0; font-family: 'SF Mono', monospace; }
  .activity.visible { display: flex; }
  .activity-dot { width: 4px; height: 4px; border-radius: 2px; background: var(--amber); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Conversation */
  .conversation { flex: 1; overflow-y: auto; padding: 20px; }
  .entry { margin-bottom: 20px; }
  .user-bubble { color: var(--muted); font-size: 13px; margin-bottom: 6px; padding-left: 2px; }
  .user-bubble::before { content: '> '; color: var(--accent); }
  .response-bubble { color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; padding: 12px 16px; background: var(--surface); border-radius: 4px; border-left: 2px solid var(--border); }
  .thinking { color: var(--amber); font-size: 12px; font-family: 'SF Mono', monospace; display: flex; align-items: center; gap: 6px; padding: 8px 0; }
  .timing { color: #444; font-size: 11px; margin-top: 4px; font-family: 'SF Mono', monospace; }

  /* Options */
  .options { padding: 8px 20px 12px; }
  .options-header { color: var(--muted); font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .option-row { display: flex; align-items: baseline; gap: 8px; padding: 6px 8px; cursor: pointer; border-radius: 3px; margin-bottom: 2px; }
  .option-row:hover { background: var(--surface); }
  .option-num { color: var(--accent); font-family: 'SF Mono', monospace; font-size: 12px; width: 16px; text-align: right; flex-shrink: 0; }
  .option-text { color: var(--text); font-size: 13px; }
  .option-all { color: var(--accent); font-size: 12px; cursor: pointer; padding: 6px 8px; margin-top: 4px; border-radius: 3px; }
  .option-all:hover { background: var(--surface); }

  /* Controls */
  .controls { padding: 12px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .status-line { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: 'SF Mono', monospace; }
  .record-row { display: flex; align-items: center; gap: 10px; }
  .record-btn { width: 36px; height: 36px; border-radius: 18px; border: 1.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: all 0.15s; -webkit-user-select: none; user-select: none; }
  .record-btn:hover { border-color: var(--accent); }
  .record-btn.recording { border-color: var(--red); background: rgba(239,68,68,0.1); }
  .record-btn.disabled { opacity: 0.3; pointer-events: none; }
  .text-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); padding: 8px 0; font-size: 14px; outline: none; resize: none; font-family: inherit; min-height: 36px; max-height: 100px; }
  .text-input::placeholder { color: #444; }
  .text-input:focus { border-color: var(--accent); }
  .send-btn { background: transparent; color: var(--accent); border: none; padding: 8px 12px; font-weight: 500; cursor: pointer; font-size: 13px; flex-shrink: 0; }
  .send-btn:hover { color: var(--text); }
  .send-btn:disabled { opacity: 0.3; }

  /* Settings */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; width: 90%; max-width: 360px; }
  .modal h3 { color: var(--text); font-size: 14px; font-weight: 500; margin-bottom: 16px; letter-spacing: 0.5px; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .setting-label { color: var(--muted); font-size: 13px; }
  .setting-value { color: var(--accent); font-size: 13px; cursor: pointer; font-family: 'SF Mono', monospace; }
  .setting-value:hover { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="session-screen" class="session-screen">
  <div class="session-title">Sonar</div>
  <div class="session-subtitle">voice interface for claude code</div>
  <div class="session-card" id="prev-sessions" style="display:none">
    <div class="session-card-label">Recent</div>
    <div id="session-list"></div>
  </div>
  <div class="session-card">
    <div class="session-card-label">Open project</div>
    <input class="new-session-input" id="project-input" placeholder="path relative to projects dir" autocapitalize="off" spellcheck="false">
    <button class="new-session-btn" id="start-btn">Start session</button>
  </div>
</div>

<div id="voice-screen" style="display:none; flex-direction:column; height:100dvh;">
  <div class="header">
    <div class="header-left">
      <span id="back-btn" style="color:var(--muted);cursor:pointer;font-size:12px">&larr; back</span>
      <span class="project-name" id="project-name-display"></span>
      <span class="branch" id="branch-display"></span>
    </div>
    <button class="header-btn" id="settings-btn">&#9881;</button>
  </div>
  <div class="ctx-bar"><div class="ctx-fill" id="ctx-fill"></div></div>
  <div class="activity" id="activity-bar">
    <div class="activity-dot"></div>
    <span id="activity-text"></span>
    <span id="activity-elapsed" style="margin-left:auto"></span>
  </div>
  <div class="conversation" id="conversation"></div>
  <div id="options-container"></div>
  <div class="controls">
    <div class="status-line" id="status-line"></div>
    <div class="record-row">
      <div class="record-btn" id="record-btn">&#127897;</div>
      <textarea class="text-input" id="text-input" placeholder="Type a message..." rows="1" spellcheck="false"></textarea>
      <button class="send-btn" id="send-btn">&rarr;</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Settings</h3>
    <div class="setting-row"><span class="setting-label">Model</span><span class="setting-value" id="setting-model">sonnet</span></div>
    <div class="setting-row"><span class="setting-label">Effort</span><span class="setting-value" id="setting-effort">low</span></div>
    <div class="setting-row"><span class="setting-label">TTS</span><span class="setting-value" id="setting-tts">ON</span></div>
    <div class="setting-row"><span class="setting-label">Plan mode</span><span class="setting-value" id="setting-plan">OFF</span></div>
    <div class="setting-row"><span class="setting-label">Context</span><span class="setting-value" id="setting-ctx">0k</span></div>
    <div style="margin-top:20px;text-align:right"><button class="header-btn" id="close-settings" style="font-size:12px">close</button></div>
  </div>
</div>

<script>
const API = window.location.origin;
let sessionId = null, projectName = '', sessionState = 'idle', uiState = 'idle';
let ttsEnabled = true, contextTokens = 0, mediaRecorder = null, audioChunks = [];
let processingStart = 0, elapsedTimer = null, activityTimer = null;
let settings = { model: 'sonnet', effort: 'low', plan_mode: false };

const $ = (id) => document.getElementById(id);
const $conv = $('conversation');

function timeAgo(ts) {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

function addMessage(role, text, timing) {
  const entry = document.createElement('div');
  entry.className = 'entry';
  const bubble = document.createElement('div');
  bubble.className = role === 'user' ? 'user-bubble' : 'response-bubble';
  bubble.textContent = text;
  entry.appendChild(bubble);
  if (timing && role === 'assistant') {
    const t = document.createElement('div');
    t.className = 'timing';
    t.textContent = timing.claude + 's' + (timing.tts > 0 ? ' + ' + timing.tts + 's tts' : '');
    entry.appendChild(t);
  }
  $conv.appendChild(entry);
  $conv.scrollTop = $conv.scrollHeight;
}

function addThinking() {
  const el = document.createElement('div');
  el.className = 'entry'; el.id = 'thinking-bubble';
  const inner = document.createElement('div');
  inner.className = 'thinking';
  const dot = document.createElement('div'); dot.className = 'activity-dot';
  inner.appendChild(dot);
  inner.appendChild(document.createTextNode(' working...'));
  el.appendChild(inner);
  $conv.appendChild(el);
  $conv.scrollTop = $conv.scrollHeight;
}

function removeThinking() { const el = $('thinking-bubble'); if (el) el.remove(); }

function showOptions(options) {
  const container = $('options-container');
  container.textContent = '';
  const wrap = document.createElement('div'); wrap.className = 'options';
  const header = document.createElement('div'); header.className = 'options-header';
  header.textContent = 'Select an option';
  wrap.appendChild(header);
  options.forEach((opt, i) => {
    const row = document.createElement('div'); row.className = 'option-row';
    row.addEventListener('click', () => selectOption(String(i + 1)));
    const num = document.createElement('div'); num.className = 'option-num'; num.textContent = String(i + 1);
    const txt = document.createElement('div'); txt.className = 'option-text'; txt.textContent = opt;
    row.appendChild(num); row.appendChild(txt); wrap.appendChild(row);
  });
  if (options.length > 1) {
    const all = document.createElement('div'); all.className = 'option-all';
    all.textContent = 'all of the above';
    all.addEventListener('click', () => selectOption('all'));
    wrap.appendChild(all);
  }
  container.appendChild(wrap);
}

function clearOptions() { $('options-container').textContent = ''; }

async function selectOption(n) {
  clearOptions();
  const text = n === 'all' ? 'User selected all options. Proceed with all of them.' : 'User selected option ' + n + '.';
  addMessage('user', n === 'all' ? 'all' : n);
  await sendToBackend(text, 'awaiting_response');
}

async function loadSessions() {
  try {
    const res = await fetch(API + '/sessions');
    const sessions = await res.json();
    if (sessions.length > 0) {
      $('prev-sessions').style.display = 'block';
      const list = $('session-list');
      list.textContent = '';
      sessions.forEach(s => {
        const item = document.createElement('div'); item.className = 'session-item';
        item.addEventListener('click', () => doResumeSession(s.session_id));
        const hdr = document.createElement('div'); hdr.className = 'session-item-header';
        const name = document.createElement('span'); name.className = 'session-item-name';
        name.textContent = s.project_name + (s.branch ? ' (' + s.branch + ')' : '');
        const time = document.createElement('span'); time.className = 'session-item-time';
        time.textContent = timeAgo(s.updated_at);
        hdr.appendChild(name); hdr.appendChild(time); item.appendChild(hdr);
        const preview = document.createElement('div'); preview.className = 'session-item-preview';
        preview.textContent = s.last_message || s.message_count + ' messages';
        item.appendChild(preview); list.appendChild(item);
      });
    }
  } catch(e) {}
}

async function startNewSession(path) {
  const res = await fetch(API + '/session/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ project_path: path }),
  });
  if (!res.ok) { alert('Project not found'); return; }
  const data = await res.json();
  sessionId = data.session_id; projectName = data.project_name;
  showVoiceScreen();
}

async function doResumeSession(sid) {
  const res = await fetch(API + '/session/' + sid + '/resume');
  if (!res.ok) { alert('Session not found'); return; }
  const data = await res.json();
  sessionId = data.session_id; projectName = data.project_name;
  showVoiceScreen();
  for (let i = 0; i < data.conversation.length; i += 2) {
    const user = data.conversation[i];
    const assistant = data.conversation[i + 1];
    if (user) addMessage('user', user.content);
    if (assistant) addMessage('assistant', assistant.content);
  }
}

function showVoiceScreen() {
  $('session-screen').style.display = 'none';
  $('voice-screen').style.display = 'flex';
  $('project-name-display').textContent = projectName;
  loadSettings();
}

async function sendToBackend(text, state) {
  addThinking(); setUI('processing'); startActivityPolling();
  try {
    const endpoint = state === 'awaiting_response' ? '/respond/text' : '/prompt/text';
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 120000);
    const res = await fetch(API + endpoint, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sessionId, text: text, tts: ttsEnabled }),
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    removeThinking();
    addMessage('assistant', data.response_text, data.timing);
    sessionState = data.state;
    if (data.context_tokens) updateContext(data.context_tokens);
    if (data.options && data.options.length > 0) showOptions(data.options);
    else clearOptions();
    if (ttsEnabled && data.audio_url) {
      setUI('listening');
      await playBase64Audio(data.audio_url);
    }
  } catch(e) {
    removeThinking();
    addMessage('assistant', 'error: ' + (e.message || 'network error'));
  }
  stopActivityPolling(); setUI('idle');
}

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  audioChunks = [];
  mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
  mediaRecorder.start(); setUI('recording');
}

function stopRecording() {
  return new Promise(resolve => {
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null; resolve(blob);
    };
    mediaRecorder.stop();
  });
}

const $rec = $('record-btn');
$rec.addEventListener('mousedown', () => { if (uiState === 'idle') startRecording(); });
$rec.addEventListener('touchstart', (e) => { e.preventDefault(); if (uiState === 'idle') startRecording(); });
$rec.addEventListener('mouseup', handleRecordEnd);
$rec.addEventListener('touchend', handleRecordEnd);

async function handleRecordEnd() {
  if (uiState !== 'recording') return;
  const blob = await stopRecording();
  setUI('transcribing');
  const form = new FormData(); form.append('audio', blob, 'audio.webm');
  try {
    const res = await fetch(API + '/transcribe', { method: 'POST', body: form });
    const data = await res.json();
    addMessage('user', data.transcript);
    await sendToBackend(data.transcript, sessionState);
  } catch(e) {
    addMessage('user', 'transcription failed');
    setUI('idle');
  }
}

$('send-btn').addEventListener('click', sendTextInput);
$('text-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextInput(); }
});
$('text-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

async function sendTextInput() {
  const input = $('text-input');
  const text = input.value.trim();
  if (!text || uiState !== 'idle') return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  await sendToBackend(text, sessionState);
}

function playBase64Audio(b64) {
  return new Promise(resolve => {
    const audio = new Audio('data:audio/mp3;base64,' + b64);
    audio.onended = resolve; audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

function setUI(state) {
  uiState = state;
  $rec.className = 'record-btn' + (state === 'recording' ? ' recording' : '') + (state !== 'idle' && state !== 'recording' ? ' disabled' : '');
  const labels = { idle: '', recording: 'recording', transcribing: 'transcribing...', processing: '', listening: 'playing audio' };
  $('status-line').textContent = labels[state] || '';
  if (state === 'processing') {
    processingStart = Date.now();
    elapsedTimer = setInterval(() => {
      const s = Math.floor((Date.now() - processingStart) / 1000);
      $('status-line').textContent = s + 's';
    }, 1000);
  } else { clearInterval(elapsedTimer); }
}

function startActivityPolling() {
  $('activity-bar').classList.add('visible');
  activityTimer = setInterval(async () => {
    try {
      const res = await fetch(API + '/session/' + sessionId + '/activity');
      const data = await res.json();
      if (data.activity && data.activity.length > 0) $('activity-text').textContent = data.activity[data.activity.length - 1];
    } catch {}
  }, 1500);
}
function stopActivityPolling() { clearInterval(activityTimer); $('activity-bar').classList.remove('visible'); }

function updateContext(tokens) {
  contextTokens = tokens;
  const pct = Math.min(tokens / 200000, 1);
  const color = pct < 0.5 ? 'var(--green)' : pct < 0.75 ? '#eab308' : pct < 0.9 ? 'var(--amber)' : 'var(--red)';
  $('ctx-fill').style.width = (pct * 100) + '%'; $('ctx-fill').style.background = color;
}

async function loadSettings() {
  try { const res = await fetch(API + '/settings'); settings = await res.json(); updateSettingsUI(); } catch {}
}
function updateSettingsUI() {
  $('setting-model').textContent = settings.model;
  $('setting-effort').textContent = settings.effort;
  $('setting-tts').textContent = ttsEnabled ? 'on' : 'off';
  $('setting-plan').textContent = settings.plan_mode ? 'on' : 'off';
  $('setting-ctx').textContent = contextTokens > 0 ? Math.round(contextTokens/1000) + 'k' : '—';
}
$('settings-btn').addEventListener('click', () => { updateSettingsUI(); $('settings-modal').classList.add('visible'); });
$('settings-modal').addEventListener('click', (e) => { if (e.target.id === 'settings-modal') e.target.classList.remove('visible'); });
$('close-settings').addEventListener('click', () => $('settings-modal').classList.remove('visible'));

$('setting-model').addEventListener('click', async () => {
  const m = ['haiku','sonnet','opus']; const next = m[(m.indexOf(settings.model)+1)%m.length];
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:next})});
  settings.model = next; updateSettingsUI();
});
$('setting-effort').addEventListener('click', async () => {
  const e = ['low','medium','high','max']; const next = e[(e.indexOf(settings.effort)+1)%e.length];
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({effort:next})});
  settings.effort = next; updateSettingsUI();
});
$('setting-tts').addEventListener('click', () => { ttsEnabled = !ttsEnabled; updateSettingsUI(); });
$('setting-plan').addEventListener('click', async () => {
  await fetch(API+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan_mode:!settings.plan_mode})});
  settings.plan_mode = !settings.plan_mode; updateSettingsUI();
});

$('start-btn').addEventListener('click', () => { const p = $('project-input').value.trim(); if (p) startNewSession(p); });
$('project-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); $('start-btn').click(); } });
$('back-btn').addEventListener('click', () => {
  $('voice-screen').style.display = 'none'; $('session-screen').style.display = 'flex';
  sessionId = null; $conv.textContent = ''; clearOptions(); loadSessions();
});
loadSessions();
</script>
</body>
</html>
